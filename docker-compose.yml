# ===========================================
# Shellty Pulse — Docker Compose Configuration
# ===========================================
# Usage:
#   docker compose up --build         (foreground)
#   docker compose up --build -d      (detached/background)
#   docker compose down               (stop & remove)
#   docker compose logs -f monitor    (follow logs)
# ===========================================

services:
  monitor:
    # --- Build & Image ---
    build:
      context: .
      dockerfile: Dockerfile
    image: shellty-pulse:latest

    # --- Container settings ---
    container_name: shellty-pulse
    hostname: shellty-pulse

    # --- Port mapping ---
    ports:
      - "${PORT:-5000}:5000"

    # --- Environment variables ---
    environment:
      PORT: "5000"
      PING_INTERVAL: "900"
      REQUEST_TIMEOUT: "10"
      MAX_SERVICES: "50"
      PYTHONUNBUFFERED: "1"
      SERVICES: >-
        [
          {"name": "KSeF Master",   "url": "https://ksef-master-backend.onrender.com/health",          "frontend_url": "https://ksef-master.netlify.app/"},
          {"name": "Postlio",       "url": "https://postlio-backend.onrender.com/health",               "frontend_url": "https://postlio.netlify.app/"},
          {"name": "Shellty Blog",  "url": "https://shellty-blog.onrender.com/health",                  "frontend_url": "https://shellty-blog.onrender.com/"},
          {"name": "SmartQuote AI", "url": "https://smartquote-backend-fzh5.onrender.com/api/health",   "frontend_url": "https://smartquote-ai.netlify.app/"}
        ]

    # --- Health check ---
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    # --- Security ---
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

    # --- Logging ---
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # --- Resource limits ---
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

    # --- Network ---
    networks:
      - app-network

networks:
  app-network:
    driver: bridge