# ===========================================
# Shellty Pulse — Docker Compose Configuration
# ===========================================
# Usage:
#   docker compose up --build         (foreground)
#   docker compose up --build -d      (detached/background)
#   docker compose down               (stop & remove)
#   docker compose logs -f monitor    (follow logs)
# ===========================================

services:
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    image: shellty-pulse:latest

    container_name: shellty-pulse
    hostname: shellty-pulse

    ports:
      - "${PORT:-5000}:5000"

    environment:
      PORT: "5000"
      PING_INTERVAL: "720"
      REQUEST_TIMEOUT: "90"
      MAX_SERVICES: "50"
      PYTHONUNBUFFERED: "1"
      AUTO_PING_ENABLED: "true"
      BUSINESS_HOURS_ENABLED: "false"
      BUSINESS_HOURS_START: "8"
      BUSINESS_HOURS_END: "20"
      BUSINESS_HOURS_TIMEZONE: "Europe/Warsaw"
      DATA_DIR: "/data"
      SERVICES: >-
        [
          {"name": "KSeF Master",    "url": "https://ksef-master-backend.onrender.com/health",          "frontend_url": "https://ksef-master.netlify.app/"},
          {"name": "Postlio",        "url": "https://postlio-backend.onrender.com/health",               "frontend_url": "https://postlio.netlify.app/"},
          {"name": "Shellty Blog",   "url": "https://shellty-blog.onrender.com/health",                  "frontend_url": "https://shellty-blog.onrender.com/"},
          {"name": "SmartQuote AI",  "url": "https://smartquote-backend-fzh5.onrender.com/api/health",   "frontend_url": "https://smart-quote-ai.vercel.app"},
          {"name": "Shellty Kanban", "url": "https://shellty-kanban.onrender.com/health",                "frontend_url": "https://kanban.shellty.it"},
          {"name": "Shellty Pulse",  "url": "http://localhost:5000/health"}
        ]

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    volumes:
      - shellty-pulse-data:/data

    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.50"

    networks:
      - app-network

  autoheal:
    image: willfarrell/autoheal:latest
    container_name: autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: all
      AUTOHEAL_INTERVAL: 10
      AUTOHEAL_START_PERIOD: 60
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  shellty-pulse-data:
