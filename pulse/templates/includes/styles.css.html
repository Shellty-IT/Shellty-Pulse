<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@700&display=swap');

  :root {
    --bg:         #050d18;
    --bg-card:    #0a1628;
    --bg-input:   #0f1f38;
    --border:     #1a3a5c;
    --blue:       #0ea5e9;
    --blue-2:     #0284c7;
    --green:      #22c55e;
    --green-2:    #16a34a;
    --red:        #ef4444;
    --amber:      #f59e0b;
    --orange:     #fb923c;
    --text:       #e2e8f0;
    --text-2:     #64748b;
    --text-link:  #38bdf8;
    --gray-track: #374151;
    --mono: "JetBrains Mono", ui-monospace, monospace;
    --sans: "Inter", system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(circle at 1px 1px, rgba(14,165,233,0.06) 1px, transparent 1px) 0 0/24px 24px,
      var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  ::selection { background: rgba(14,165,233,0.3); }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-card); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--blue); }

  button { font: inherit; cursor: pointer; }
  input  { font: inherit; }
  *:focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; border-radius: 4px; }

  /* ===== Layout ===== */
  .wrap {
    max-width: 1040px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  /* ===== Header / Brand ===== */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 132px;
    height: 132px;
    display: block;
    animation: heartbeat 2s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(14,165,233,0.30));
    transition: filter 200ms ease;
    cursor: pointer;
  }
  .logo-icon:hover {
    filter: drop-shadow(0 0 22px rgba(34,197,94,0.50));
  }
  .logo-icon #pulse-line path {
    animation: pulseGlow 2s ease-in-out infinite;
  }
  .logo-icon:hover #pulse-line path {
    animation: pulseGlowHover 0.6s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%   { transform: scale(1);    }
    15%  { transform: scale(1.08); }
    30%  { transform: scale(1);    }
    45%  { transform: scale(1.05); }
    60%  { transform: scale(1);    }
    100% { transform: scale(1);    }
  }
  @keyframes pulseGlow {
    0%   { filter: drop-shadow(0 0 2px  rgba(37,239,255,0.3)); opacity: 0.6; }
    15%  { filter: drop-shadow(0 0 14px rgba(37,239,255,1)) drop-shadow(0 0 28px rgba(37,239,255,0.6)); opacity: 1; }
    30%  { filter: drop-shadow(0 0 2px  rgba(37,239,255,0.3)); opacity: 0.6; }
    45%  { filter: drop-shadow(0 0 10px rgba(37,239,255,0.9)) drop-shadow(0 0 20px rgba(37,239,255,0.5)); opacity: 1; }
    60%  { filter: drop-shadow(0 0 2px  rgba(37,239,255,0.3)); opacity: 0.6; }
    100% { filter: drop-shadow(0 0 2px  rgba(37,239,255,0.3)); opacity: 0.6; }
  }
  @keyframes pulseGlowHover {
    0%   { filter: drop-shadow(0 0 8px  rgba(37,239,255,0.7)); opacity: 0.9; }
    50%  { filter: drop-shadow(0 0 24px rgba(37,239,255,1)) drop-shadow(0 0 40px rgba(37,239,255,0.8)); opacity: 1; }
    100% { filter: drop-shadow(0 0 8px  rgba(37,239,255,0.7)); opacity: 0.9; }
  }
  .brand h1 {
    font-family: "Orbitron", var(--sans);
    font-size: 38px;
    font-weight: 700;
    margin: 8px 0 2px;
    color: #fff;
    letter-spacing: 0.04em;
  }
  .brand h1 .ty { color: #0cc0ff; }
  .brand .sub {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ===== Status Banner ===== */
  .banner {
    position: relative;
    border-left: 4px solid var(--red);
    background: rgba(239,68,68,0.08);
    backdrop-filter: blur(6px);
    border-radius: 6px;
    padding: 14px 20px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--red);
    font-weight: 600;
    overflow: hidden;
  }
  .banner::after {
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.03) 0 1px, transparent 1px 3px);
    pointer-events: none;
  }
  .banner .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--red); box-shadow: 0 0 10px var(--red);
    animation: blink 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }
  @keyframes spin   { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Banner state variants */
  .banner.ok       { border-left-color: var(--green);  background: rgba(34,197,94,0.08);   color: var(--green);  }
  .banner.deg      { border-left-color: var(--amber);  background: rgba(245,158,11,0.08);  color: var(--amber);  }
  .banner.slow     { border-left-color: var(--orange); background: rgba(251,146,60,0.08);  color: var(--orange); }
  .banner.checking { border-left-color: var(--blue);   background: rgba(14,165,233,0.08);  color: var(--blue);   }
  .banner.unknown  { border-left-color: #475569;       background: rgba(71,85,105,0.08);   color: #94a3b8;       }

  .banner.ok       .dot { background: var(--green);  box-shadow: 0 0 10px var(--green);  animation: none; }
  .banner.deg      .dot { background: var(--amber);  box-shadow: 0 0 10px var(--amber);  }
  .banner.slow     .dot { background: var(--orange); box-shadow: 0 0 10px var(--orange); }
  .banner.checking .dot { background: var(--blue);   box-shadow: 0 0 10px var(--blue);   }
  .banner.unknown  .dot { background: #475569; box-shadow: none; animation: none; }

  /* ===== Legend ===== */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 20px 24px;
    align-items: center;
    justify-content: center;
    padding: 10px 18px;
    border: 1px solid var(--border);
    border-radius: 999px;
    background: var(--bg-card);
    margin-bottom: 24px;
    font-family: var(--mono);
    font-size: 12px;
  }
  .legend .item { display: inline-flex; align-items: center; gap: 8px; color: var(--text); }
  .legend .item .ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .legend .item .th { color: var(--text-2); }
  .ld.op   { background: var(--green);  box-shadow: 0 0 6px var(--green); }
  .ld.deg  { background: var(--amber);  box-shadow: 0 0 6px var(--amber); }
  .ld.slow { background: var(--orange); box-shadow: 0 0 6px var(--orange); }
  .ld.down { background: var(--red);    box-shadow: 0 0 6px var(--red); }
  .ld.unk  { background: #94a3b8; }
  .ld.dis  { background: #475569; }

  /* ===== Controls ===== */
  .controls {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .controls .label {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-2);
    margin-left: 6px;
    margin-right: 2px;
  }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--blue), var(--blue-2));
    color: #fff; border: none;
    border-radius: 6px;
    padding: 9px 16px;
    font-weight: 700;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    transition: all 150ms ease;
  }
  .btn-primary:hover:not(:disabled) {
    filter: brightness(1.12);
    box-shadow: 0 0 16px rgba(14,165,233,0.5);
  }
  .btn-primary:disabled { opacity: 0.55; cursor: not-allowed; }
  .btn-primary:disabled .ico { animation: spin 0.8s linear infinite; }
  .btn-primary.green { background: linear-gradient(135deg, var(--green), var(--green-2)); }
  .btn-primary.green:hover:not(:disabled) { box-shadow: 0 0 16px rgba(34,197,94,0.5); }

  .btn-ghost {
    display: inline-flex; align-items: center; gap: 8px;
    border: 1px solid var(--red); color: var(--red);
    background: transparent; border-radius: 6px;
    padding: 8px 14px;
    font-weight: 600; font-size: 12px;
    text-transform: uppercase; letter-spacing: 0.05em;
    transition: all 150ms ease;
    position: relative;
  }
  .btn-ghost.on {
    border-color: var(--green); color: var(--green);
    background: rgba(34,197,94,0.10);
  }
  .btn-ghost:hover { box-shadow: 0 0 14px rgba(239,68,68,0.35); }
  .btn-ghost.on:hover { box-shadow: 0 0 14px rgba(34,197,94,0.4); }
  .btn-ghost.on::before {
    content: ""; position: absolute; inset: -3px;
    border: 1px solid var(--green); border-radius: 8px;
    opacity: 0.4;
    animation: pulse-ring 2s ease-out infinite;
  }
  @keyframes pulse-ring {
    0%   { transform: scale(0.95); opacity: 0.7; }
    100% { transform: scale(1.15); opacity: 0; }
  }

  .pills { display: inline-flex; gap: 6px; flex-wrap: wrap; }
  .pill {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-2);
    border-radius: 4px;
    padding: 6px 12px;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    transition: all 150ms ease;
  }
  .pill:hover:not(:disabled) { border-color: var(--blue); color: var(--text); }
  .pill.active {
    background: var(--blue);
    color: #fff;
    border-color: var(--blue);
    box-shadow: 0 0 10px rgba(14,165,233,0.4);
  }
  .pill:disabled { opacity: 0.4; cursor: not-allowed; }

  .last-check {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-2);
    margin: 4px 0 28px;
    text-align: center;
  }
  .last-check::before { content: "\203A "; color: var(--blue); }

  /* ===== Section title ===== */
  .section-title {
    font-size: 11px;
    font-family: var(--mono);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-2);
    margin: 0 0 10px 4px;
  }
  .section-title .accent { color: var(--blue); }

  /* ===== Service cards ===== */
  .services {
    display: flex; flex-direction: column;
    gap: 8px;
    margin-bottom: 32px;
  }
  .svc {
    position: relative;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-left: 4px solid var(--red);
    border-radius: 8px;
    padding: 14px 18px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 16px;
    align-items: center;
    transition: all 180ms ease;
  }
  .svc:hover {
    border-color: var(--blue);
    border-left-color: var(--blue);
    box-shadow: 0 0 20px rgba(14,165,233,0.12);
    transform: translateY(-1px);
  }
  /* Status border colours */
  .svc.op   { border-left-color: var(--green); }
  .svc.deg  { border-left-color: var(--amber); }
  .svc.slow { border-left-color: var(--orange); }
  .svc.unk  { border-left-color: #475569; }
  .svc.dis  { border-left-color: #334155; opacity: 0.55; border-style: dashed; }
  .svc.op:hover  { border-left-color: var(--blue); }
  .svc.deg:hover { border-left-color: var(--blue); }
  .svc.dis:hover { transform: none; box-shadow: none; }

  .svc-left { display: flex; align-items: center; gap: 14px; min-width: 0; }

  /* Status dot */
  .svc-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    flex-shrink: 0;
    position: relative;
  }
  .svc-dot::after {
    content: ""; position: absolute; inset: -4px;
    border-radius: 50%;
    border: 1px solid var(--red);
    opacity: 0.5;
    animation: pulse-ring 1.8s ease-out infinite;
  }
  .svc.op   .svc-dot { background: var(--green);  box-shadow: 0 0 8px var(--green); }
  .svc.deg  .svc-dot { background: var(--amber);  box-shadow: 0 0 8px var(--amber); }
  .svc.slow .svc-dot { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
  .svc.unk  .svc-dot { background: #94a3b8; box-shadow: none; }
  .svc.dis  .svc-dot { background: #475569; box-shadow: none; }
  .svc.op   .svc-dot::after { display: none; }
  .svc.unk  .svc-dot::after { display: none; }
  .svc.dis  .svc-dot::after { display: none; }
  .svc.deg  .svc-dot::after { border-color: var(--amber); }
  .svc.slow .svc-dot::after { border-color: var(--orange); }

  .svc-info { min-width: 0; }
  .svc-name {
    display: inline-flex; align-items: center; gap: 6px;
    color: #fff; font-weight: 700; font-size: 15px;
    line-height: 1.2;
  }
  .svc-name a { color: #fff; text-decoration: none; }
  .svc-name a:hover { color: var(--text-link); }
  .svc-url {
    display: block;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-link);
    text-decoration: none;
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .svc-url:hover { text-decoration: underline; }

  .svc-right { display: flex; align-items: center; gap: 16px; }
  .svc-metrics { text-align: right; min-width: 74px; }
  .svc-ms {
    font-family: var(--mono);
    font-weight: 700;
    font-size: 15px;
    color: var(--red);
  }
  .svc.op   .svc-ms { color: var(--green); }
  .svc.deg  .svc-ms { color: var(--amber); }
  .svc.slow .svc-ms { color: var(--orange); }
  .svc.unk  .svc-ms { color: #94a3b8; }
  .svc.dis  .svc-ms { color: #475569; }
  .svc-uptime {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-2);
    margin-top: 2px;
  }
  .svc-bar {
    margin-top: 4px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .svc-bar > i {
    display: block; height: 100%;
    background: var(--red);
    border-radius: 2px;
  }
  .svc.op   .svc-bar > i { background: var(--green); }
  .svc.deg  .svc-bar > i { background: var(--amber); }
  .svc.slow .svc-bar > i { background: var(--orange); }
  .svc.unk  .svc-bar > i { background: #94a3b8; }
  .svc.dis  .svc-bar > i { background: #475569; }

  /* ===== Toggle switch ===== */
  .switch {
    position: relative;
    width: 42px; height: 22px;
    border-radius: 999px;
    background: var(--green);
    box-shadow: 0 0 10px rgba(34,197,94,0.3);
    transition: background 200ms, box-shadow 200ms;
    flex-shrink: 0;
    border: none;
    padding: 0;
  }
  .switch::after {
    content: ""; position: absolute;
    top: 2px; left: 22px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    transition: left 200ms;
  }
  .switch.off { background: var(--gray-track); box-shadow: none; }
  .switch.off::after { left: 2px; }
  .switch.sm { width: 36px; height: 18px; }
  .switch.sm::after { width: 14px; height: 14px; top: 2px; left: 18px; }
  .switch.sm.off::after { left: 2px; }
  .switch.busy { opacity: 0.5; cursor: progress; }
  .switch:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ===== Icon buttons ===== */
  .icon-btn {
    width: 28px; height: 28px;
    display: inline-flex; align-items: center; justify-content: center;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-2);
    border-radius: 6px;
    transition: all 150ms;
    padding: 0;
  }
  .icon-btn:hover { color: var(--blue); border-color: var(--blue); }
  .icon-btn.danger:hover {
    color: var(--red); border-color: var(--red);
    background: rgba(239,68,68,0.10);
  }
  .icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .icon-btn:disabled:hover { color: var(--text-2); border-color: var(--border); background: transparent; }
  .icon-btn .spin { transition: transform 600ms ease; }
  .icon-btn:active:not(:disabled) .spin { transform: rotate(360deg); }
  .icon-btn.spinning .spin { animation: spin 0.8s linear infinite; }

  /* ===== Panels (BH + Add Service) ===== */
  .panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px 22px;
    margin-top: 16px;
  }
  .panel-head {
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
  }
  .panel-title {
    color: #fff;
    font-weight: 700;
    font-size: 15px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .panel-title .plus { color: var(--blue); font-size: 18px; line-height: 1; }

  /* ===== Business Hours ===== */
  .bh-head-right {
    display: flex; align-items: center; gap: 10px;
  }
  .bh-badge {
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 9px;
    border-radius: 999px;
    letter-spacing: 0.04em;
  }
  .bh-badge.on  { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.4); }
  .bh-badge.off { background: rgba(100,116,139,0.10); color: var(--text-2); border: 1px solid var(--border); }

  .bh-row {
    display: flex; align-items: center;
    gap: 12px; flex-wrap: wrap;
    font-family: var(--mono);
    color: var(--text-2);
  }
  .bh-label  { color: var(--text-2); font-size: 13px; }
  .stepper   { display: inline-flex; align-items: center; gap: 6px; }
  .stepper .num {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    min-width: 52px;
    height: 40px;
    text-align: center;
    color: #fff;
    font-family: var(--mono);
    font-weight: 700;
    font-size: 22px;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .step-btn {
    width: 32px; height: 32px;
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--blue);
    border-radius: 6px;
    font-size: 16px;
    line-height: 1;
    transition: all 150ms;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .step-btn:hover { background: var(--blue); color: #fff; border-color: var(--blue); }
  .bh-mins { color: var(--text-2); font-family: var(--mono); font-size: 13px; }
  .bh-sep  { color: var(--text-2); font-size: 16px; }
  .bh-tz   { color: var(--text-2); text-transform: uppercase; font-size: 10px; letter-spacing: 0.1em; margin-left: 4px; }
  .bh-desc {
    color: var(--text-2);
    font-size: 12px;
    line-height: 1.6;
    margin: 14px 0 0;
    font-style: italic;
  }

  /* ===== Add service form ===== */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1.2fr 1fr auto;
    gap: 10px;
    align-items: center;
  }
  .input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
    width: 100%;
    transition: all 150ms;
  }
  .input.mono { font-family: var(--mono); }
  .input::placeholder { color: #374151; }
  .input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(14,165,233,0.15); }
  .form-note {
    color: var(--text-2);
    font-size: 12px;
    font-style: italic;
    margin: 12px 0 0;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .form-note .warn { color: var(--amber); }

  /* ===== Loading / Footer ===== */
  .loading {
    text-align: center;
    padding: 48px;
    color: var(--text-2);
    font-family: var(--mono);
    font-size: 13px;
  }
  footer {
    text-align: center;
    padding: 48px 0 0;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text-2);
  }
  footer a { color: var(--text-link); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ===== Responsive ===== */
  @media (max-width: 720px) {
    .wrap { padding: 24px 16px 60px; }
    .brand h1 { font-size: 28px; }
    .logo-icon { width: 96px; height: 96px; }
    .svc { grid-template-columns: 1fr; }
    .svc-right { justify-content: space-between; }
    .form-grid { grid-template-columns: 1fr; }
    .controls { justify-content: center; }
    .legend { border-radius: 12px; font-size: 11px; gap: 12px 16px; }
    .bh-row { gap: 8px; }
  }
