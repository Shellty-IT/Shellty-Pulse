<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0d1117; color: #c9d1d9; min-height: 100vh; padding: 2rem; }
    .container { max-width: 920px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; display: flex; flex-direction: column; align-items: center; gap: 0.2rem; }
    .logo-icon { width: 160px; height: 160px; display: block; animation: heartbeat 2s ease-in-out infinite; filter: drop-shadow(0 0 8px rgba(0, 166, 254, 0.4)); transition: filter 0.3s ease, transform 0.3s ease; cursor: pointer; }
    .logo-icon:hover { filter: drop-shadow(0 0 12px rgba(37, 239, 255, 0.6)) drop-shadow(0 0 24px rgba(0, 166, 254, 0.4)); transform: scale(1.1); }
    @keyframes heartbeat { 0% { transform: scale(1); } 15% { transform: scale(1.1); } 30% { transform: scale(1); } 45% { transform: scale(1.06); } 60% { transform: scale(1); } 100% { transform: scale(1); } }
    .logo-icon #pulse-line path { animation: pulseGlow 2s ease-in-out infinite; }
    @keyframes pulseGlow { 0% { filter: drop-shadow(0 0 2px rgba(37,239,255,0.3)); opacity: 0.6; } 15% { filter: drop-shadow(0 0 14px rgba(37,239,255,1)) drop-shadow(0 0 28px rgba(37,239,255,0.6)); opacity: 1; } 30% { filter: drop-shadow(0 0 2px rgba(37,239,255,0.3)); opacity: 0.6; } 45% { filter: drop-shadow(0 0 10px rgba(37,239,255,0.9)) drop-shadow(0 0 20px rgba(37,239,255,0.5)); opacity: 1; } 60% { filter: drop-shadow(0 0 2px rgba(37,239,255,0.3)); opacity: 0.6; } 100% { filter: drop-shadow(0 0 2px rgba(37,239,255,0.3)); opacity: 0.6; } }
    .logo-icon:hover #pulse-line path { animation: pulseGlowHover 0.6s ease-in-out infinite; }
    @keyframes pulseGlowHover { 0% { filter: drop-shadow(0 0 8px rgba(37,239,255,0.7)); opacity: 0.9; } 50% { filter: drop-shadow(0 0 24px rgba(37,239,255,1)) drop-shadow(0 0 40px rgba(37,239,255,0.8)); opacity: 1; } 100% { filter: drop-shadow(0 0 8px rgba(37,239,255,0.7)); opacity: 0.9; } }
    header h1 { font-size: 2.2rem; color: #f0f6fc; margin: 0; }
    .brand-accent { color: #58a6ff; }
    .subtitle { color: #8b949e; font-size: 0.95rem; }
    .overall-status { text-align: center; padding: 1rem 2rem; border-radius: 12px; margin-bottom: 1rem; font-size: 1.1rem; font-weight: 600; border: 1px solid #30363d; }
    .overall-status.operational { background: #0d1f0d; border-color: #238636; color: #3fb950; }
    .overall-status.degraded    { background: #1f1d0d; border-color: #9e6a03; color: #d29922; }
    .overall-status.slow        { background: #1f160d; border-color: #bd5a00; color: #db6d28; }
    .overall-status.down        { background: #1f0d0d; border-color: #da3633; color: #f85149; }
    .overall-status.unknown     { background: #161b22; border-color: #30363d; color: #8b949e; }
    /* checking — neutral blue, shown while check is in progress */
    .overall-status.checking    { background: #0d1a2e; border-color: #1f6feb; color: #79c0ff; }

    /* ── Check progress banner ── */
    #check-banner { display: none; align-items: center; gap: 0.75rem; padding: 0.75rem 1.25rem; margin-bottom: 1rem; background: #0d1a2e; border: 1px solid #1f6feb; border-radius: 10px; color: #79c0ff; font-size: 0.9rem; font-weight: 500; }
    #check-banner.visible { display: flex; }
    .banner-spinner { width: 16px; height: 16px; border: 2px solid #1f6feb; border-top-color: #58a6ff; border-radius: 50%; animation: spin 0.9s linear infinite; flex-shrink: 0; }
    .banner-phase { font-weight: 700; color: #58a6ff; }
    #banner-countdown { font-variant-numeric: tabular-nums; color: #8b949e; }

    .status-legend { display: flex; flex-wrap: wrap; gap: 0.75rem 1.25rem; justify-content: center; align-items: center; margin-bottom: 1.5rem; padding: 0.6rem 1rem; background: #161b22; border: 1px solid #30363d; border-radius: 10px; font-size: 0.8rem; }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; color: #8b949e; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .legend-dot.operational { background: #3fb950; }
    .legend-dot.degraded { background: #d29922; }
    .legend-dot.slow { background: #db6d28; }
    .legend-dot.down { background: #f85149; }
    .legend-dot.unknown { background: #484f58; }
    .legend-desc { color: #6e7681; }
    .controls { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: center; margin-bottom: 1.5rem; }
    .btn { padding: 0.6rem 1.2rem; border: 1px solid #30363d; border-radius: 8px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 0.9rem; transition: all 0.2s; }
    .btn:hover { background: #30363d; border-color: #58a6ff; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.primary { background: #238636; border-color: #238636; color: #fff; }
    .btn.primary:hover:not(:disabled) { background: #2ea043; }
    .btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .btn.inactive { background: #21262d; border-color: #f85149; color: #f85149; }
    .interval-selector { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
    .interval-label { color: #8b949e; font-size: 0.8rem; margin-right: 0.2rem; }
    .interval-btn { padding: 0.3rem 0.65rem; border: 1px solid #30363d; border-radius: 6px; background: #21262d; color: #8b949e; cursor: pointer; font-size: 0.78rem; transition: all 0.2s; }
    .interval-btn:hover { border-color: #58a6ff; color: #c9d1d9; }
    .interval-btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
    .interval-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .interval-btn:disabled:hover { border-color: #30363d; color: #8b949e; }
    .check-info { color: #8b949e; font-size: 0.85rem; text-align: center; width: 100%; }
    .services-grid { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
    .service-card { display: flex; align-items: center; gap: 1rem; padding: 1rem 1.25rem; background: #161b22; border: 1px solid #30363d; border-radius: 10px; transition: border-color 0.2s; }
    .service-card:hover { border-color: #58a6ff; }
    .status-icon { font-size: 1.5rem; flex-shrink: 0; }
    .service-info { flex: 1; min-width: 0; }
    .service-name { font-weight: 600; color: #f0f6fc; font-size: 1rem; margin-bottom: 0.15rem; }
    .service-name a { color: #f0f6fc; text-decoration: none; transition: color 0.2s; }
    .service-name a:hover { color: #58a6ff; }
    .service-name .link-arrow { font-size: 0.7rem; opacity: 0.4; margin-left: 0.2rem; transition: opacity 0.2s; }
    .service-name a:hover .link-arrow { opacity: 1; }
    .service-backend { display: flex; align-items: center; gap: 0.3rem; font-size: 0.78rem; margin-top: 0.1rem; }
    .backend-label { color: #6e7681; font-weight: 500; flex-shrink: 0; }
    .backend-link { color: #58a6ff; text-decoration: none; word-break: break-all; transition: color 0.2s; }
    .backend-link:hover { color: #79c0ff; text-decoration: underline; }
    .service-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 0.3rem; flex-shrink: 0; }
    .response-time { font-size: 0.85rem; font-weight: 600; color: #8b949e; }
    .response-time.fast { color: #3fb950; }
    .response-time.medium { color: #d29922; }
    .response-time.slow { color: #db6d28; }
    .response-time.timeout { color: #f85149; }
    .uptime-bar { width: 80px; height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
    .uptime-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
    .uptime-text { font-size: 0.7rem; color: #8b949e; }
    .service-actions { display: flex; gap: 0.4rem; flex-shrink: 0; }
    .btn-icon { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border: 1px solid #30363d; border-radius: 8px; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 1rem; transition: all 0.2s; }
    .btn-icon:hover { background: #30363d; border-color: #58a6ff; }
    .btn-icon.delete:hover { border-color: #f85149; color: #f85149; }
    .btn-icon.spinning { animation: spin 1s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .business-hours { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
    .bh-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
    .bh-header h3 { color: #f0f6fc; font-size: 1rem; margin: 0; }
    .bh-badge { font-size: 0.75rem; font-weight: 600; padding: 0.2rem 0.6rem; border-radius: 20px; letter-spacing: 0.03em; }
    .bh-badge.on  { background: #0d1f0d; color: #3fb950; border: 1px solid #238636; }
    .bh-badge.off { background: #161b22; color: #484f58; border: 1px solid #30363d; }
    .bh-body { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .bh-control { display: flex; align-items: center; gap: 0.4rem; }
    .bh-label { font-size: 0.85rem; color: #8b949e; font-weight: 500; }
    .bh-btn-adjust { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; background: #21262d; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: all 0.2s; user-select: none; }
    .bh-btn-adjust:hover { background: #30363d; border-color: #58a6ff; }
    .bh-btn-adjust:active { transform: scale(0.92); }
    .bh-hour-display { min-width: 38px; padding: 0.25rem 0.4rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #f0f6fc; font-size: 1.3rem; font-weight: 700; text-align: center; font-variant-numeric: tabular-nums; }
    .bh-minutes { font-size: 0.85rem; color: #6e7681; font-weight: 500; }
    .bh-separator { font-size: 1rem; color: #484f58; margin: 0 0.25rem; }
    .bh-tz { font-size: 0.7rem; color: #6e7681; font-style: italic; margin-left: 0.25rem; }
    .btn-bh-toggle { padding: 0.55rem 1.1rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; margin-left: auto; }
    .btn-bh-toggle.enable  { background: #238636; border-color: #238636; color: #fff; }
    .btn-bh-toggle.enable:hover  { background: #2ea043; }
    .btn-bh-toggle.disable { background: #21262d; border-color: #f85149; color: #f85149; }
    .btn-bh-toggle.disable:hover { background: #2d1b1b; }
    .bh-note { margin-top: 0.75rem; font-size: 0.75rem; color: #6e7681; font-style: italic; line-height: 1.5; }
    .add-service { background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 1.25rem; }
    .add-service h3 { color: #f0f6fc; margin-bottom: 1rem; font-size: 1rem; }
    .form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; }
    .form-row input { flex: 1; min-width: 150px; padding: 0.5rem 0.75rem; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: #c9d1d9; font-size: 0.9rem; }
    .form-row input:focus { outline: none; border-color: #58a6ff; }
    .form-row input::placeholder { color: #484f58; }
    .add-note { margin-top: 0.6rem; font-size: 0.75rem; color: #6e7681; font-style: italic; }
    footer { text-align: center; padding-top: 2rem; color: #484f58; font-size: 0.8rem; }
    footer a { color: #58a6ff; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .loading { text-align: center; padding: 2rem; color: #8b949e; }
    @media (max-width: 600px) {
        body { padding: 1rem; }
        header h1 { font-size: 1.6rem; }
        .logo-icon { width: 80px; height: 80px; }
        .service-card { flex-wrap: wrap; }
        .service-meta { flex-direction: row; align-items: center; width: 100%; }
        .service-actions { width: 100%; justify-content: flex-end; }
        .status-legend { font-size: 0.72rem; gap: 0.5rem 0.75rem; }
        .bh-body { flex-direction: column; align-items: flex-start; }
    }
</style>
