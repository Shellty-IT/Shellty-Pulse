<script>
var POLL_IDLE   = 30000;
var POLL_ACTIVE = 4000;

var STATUS_CONFIG = {
    checking:    { icon: '🔵', label: 'Checking Services…'      },
    operational: { icon: '🟢', label: 'All Systems Operational' },
    degraded:    { icon: '🟡', label: 'Performance Degraded'    },
    slow:        { icon: '🟠', label: 'Slow Response Detected'  },
    down:        { icon: '🔴', label: 'Service Outage Detected' },
    unknown:     { icon: '⚪', label: 'Status Unknown'          },
    disabled:    { icon: '⏸',  label: 'Service Disabled'        }
};

var _pollTimer       = null;
var _wasRunning      = false;
var _bhUserEditing   = false;
var _bhEditTimer     = null;

function getStatusConfig(s) { return STATUS_CONFIG[s] || STATUS_CONFIG.unknown; }
function rtClass(ms) { if (ms == null) return 'timeout'; if (ms < 1000) return 'fast'; if (ms <= 3000) return 'medium'; return 'slow'; }
function rtText(ms)  { if (ms == null) return '—'; return ms < 1000 ? ms + 'ms' : (ms/1000).toFixed(2) + 's'; }
function uptimeColor(p) { if (p >= 95) return '#3fb950'; if (p >= 80) return '#d29922'; if (p >= 50) return '#db6d28'; return '#f85149'; }
function timeAgo(iso) { if (!iso) return 'never'; var d = (Date.now() - new Date(iso).getTime())/1000; if (d < 60) return Math.round(d)+'s ago'; if (d < 3600) return Math.round(d/60)+' min ago'; return Math.round(d/3600)+'h ago'; }
function escapeHtml(t) { var d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
function intervalLabel(s) { if (s >= 86400) return Math.round(s/86400)+'d'; if (s >= 3600) return Math.round(s/3600)+'h'; return Math.round(s/60)+' min'; }

function _setPolling(interval) {
    if (_pollTimer) clearInterval(_pollTimer);
    _pollTimer = setInterval(fetchServices, interval);
}

function _applyRunningState(running) {
    var btn    = document.getElementById('check-all-btn');
    var banner = document.getElementById('check-banner');

    if (running) {
        btn.disabled    = true;
        btn.textContent = '⟳ Checking…';
        banner.classList.add('visible');
        _setPolling(POLL_ACTIVE);
    } else {
        btn.disabled    = false;
        btn.textContent = '⟳ Check All Now';
        banner.classList.remove('visible');
        _setPolling(POLL_IDLE);
    }
}

async function fetchServices() {
    try {
        var res  = await fetch('/api/services');
        var data = await res.json();
        renderDashboard(data);
    } catch (err) {
        console.error('Fetch failed:', err);
    }
}

async function checkAll() {
    var btn = document.getElementById('check-all-btn');
    if (btn.disabled) return;

    try {
        btn.disabled    = true;
        btn.textContent = '⟳ Checking…';

        var res = await fetch('/api/check-all', { method: 'POST' });

        if (res.ok) {
            _setPolling(POLL_ACTIVE);
        } else if (res.status === 409) {
            // Already running
        } else {
            var data = await res.json();
            alert('Failed: ' + (data.error || 'Unknown error'));
            btn.disabled    = false;
            btn.textContent = '⟳ Check All Now';
        }
    } catch (err) {
        console.error(err);
        alert('Error: ' + err.message);
        btn.disabled    = false;
        btn.textContent = '⟳ Check All Now';
    }
}

async function checkService(id) {
    var btn = document.getElementById('check-btn-' + id);
    if (btn) btn.classList.add('spinning');
    try { await fetch('/api/services/' + id + '/check', { method: 'POST' }); await fetchServices(); }
    catch (err) { console.error(err); }
    if (btn) btn.classList.remove('spinning');
}

async function toggleAutoPing() {
    try { await fetch('/api/toggle-auto-ping', { method: 'POST' }); await fetchServices(); }
    catch (err) { console.error(err); }
}

async function setPingInterval(seconds) {
    try {
        var res = await fetch('/api/ping-interval', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ interval: seconds })
        });
        if (res.ok) await fetchServices();
        else { var e = await res.json(); alert(e.error || 'Failed.'); }
    } catch (err) { console.error(err); }
}

async function addService() {
    var name     = document.getElementById('new-name').value.trim();
    var url      = document.getElementById('new-url').value.trim();
    var frontend = document.getElementById('new-frontend-url').value.trim();
    if (!name || !url) { alert('Enter both name and URL.'); return; }
    var payload = { name: name, url: url };
    if (frontend) payload.frontend_url = frontend;
    try {
        var res = await fetch('/api/services', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });
        if (res.ok) {
            document.getElementById('new-name').value         = '';
            document.getElementById('new-url').value          = '';
            document.getElementById('new-frontend-url').value = '';
            await fetchServices();
        } else { var e = await res.json(); alert(e.error || 'Failed.'); }
    } catch (err) { console.error(err); }
}

async function deleteService(id) {
    if (!confirm('Delete this service?')) return;
    try { await fetch('/api/services/' + id, { method: 'DELETE' }); await fetchServices(); }
    catch (err) { console.error(err); }
}

async function toggleServiceEnabled(id) {
    var btn = document.getElementById('toggle-btn-' + id);
    if (btn) { btn.disabled = true; btn.classList.add('busy'); }
    try {
        var res = await fetch('/api/services/' + id + '/toggle-enabled', { method: 'POST' });
        if (!res.ok) {
            var e = await res.json().catch(function () { return {}; });
            alert(e.error || ('Failed (HTTP ' + res.status + ').'));
        }
        await fetchServices();
    } catch (err) {
        console.error(err);
        alert('Error: ' + err.message);
    }
    if (btn) { btn.disabled = false; btn.classList.remove('busy'); }
}

function adjustHour(elementId, delta) {
    var elem = document.getElementById(elementId);
    var val  = parseInt(elem.textContent);
    if (isNaN(val)) val = 9;
    val += delta;
    if (val < 0)  val = 23;
    if (val > 23) val = 0;
    elem.textContent = val;
    _bhUserEditing = true;
    if (_bhEditTimer) clearTimeout(_bhEditTimer);
    _bhEditTimer = setTimeout(function() { _bhUserEditing = false; _bhEditTimer = null; }, 120000);
}

async function toggleBusinessHours() {
    var btn     = document.getElementById('bh-toggle-btn');
    var enabled = btn.classList.contains('enable');
    var start   = parseInt(document.getElementById('bh-start').textContent);
    var end     = parseInt(document.getElementById('bh-end').textContent);

    if (isNaN(start) || isNaN(end)) { alert('Invalid hour values.'); return; }
    if (start === end) { alert('"From" and "To" must be different hours.'); return; }

    try {
        var res = await fetch('/api/business-hours', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ enabled: enabled, start: start, end: end })
        });
        if (res.ok) {
            _bhUserEditing = false;
            if (_bhEditTimer) { clearTimeout(_bhEditTimer); _bhEditTimer = null; }
            await fetchServices();
        } else { var e = await res.json(); alert(e.error || 'Failed.'); }
    } catch (err) { console.error(err); }
}

function renderDashboard(data) {
    var services = data.services;
    var meta     = data.meta;

    var oel  = document.getElementById('overall-status');
    var ocfg = getStatusConfig(meta.overall_status);
    oel.className   = 'overall-status ' + meta.overall_status;
    oel.textContent = ocfg.icon + ' ' + ocfg.label;

    var running = meta.check_running;
    _applyRunningState(running);
    _wasRunning = running;

    var apb = document.getElementById('auto-ping-btn');
    if (meta.auto_ping_enabled) { apb.className = 'btn active';   apb.textContent = '⏱ Auto-Ping: ON';  }
    else                        { apb.className = 'btn inactive'; apb.textContent = '⏱ Auto-Ping: OFF'; }

    document.querySelectorAll('.interval-btn').forEach(function(b) {
        var val = parseInt(b.getAttribute('data-interval'));
        b.classList.toggle('active', val === meta.ping_interval);
        b.disabled = !meta.auto_ping_enabled;
    });

    var ci = document.getElementById('check-info');
    if (running) {
        ci.textContent = '⟳ Check in progress…';
    } else if (meta.last_check) {
        var ago      = timeAgo(meta.last_check);
        var intLabel = intervalLabel(meta.ping_interval);
        if (meta.auto_ping_enabled) {
            var elapsed   = (Date.now() - new Date(meta.last_check).getTime()) / 1000;
            var remainSec = Math.max(0, meta.ping_interval - elapsed);
            var rt = remainSec >= 86400 ? Math.round(remainSec/86400)+'d'
                   : remainSec >= 3600  ? Math.round(remainSec/3600)+'h'
                   : Math.round(remainSec/60)+' min';
            ci.textContent = 'Last check: ' + ago + ' · Next in: ~' + rt + ' · Interval: ' + intLabel;
        } else {
            ci.textContent = 'Last check: ' + ago + ' · Auto-ping disabled';
        }
    } else {
        ci.textContent = 'No checks yet · Interval: ' + intervalLabel(meta.ping_interval);
    }

    var grid = document.getElementById('services-grid');
    if (services.length === 0) {
        grid.innerHTML = '<div class="loading">No services configured. Add one below.</div>';
    } else {
        grid.innerHTML = services.map(function(svc) {
            var isEnabled = svc.enabled !== false;
            var isSelf = svc.url.indexOf(window.location.origin) === 0;
            var effectiveStatus = isEnabled ? svc.status : 'disabled';
            var cfg      = getStatusConfig(effectiveStatus);
            var upPct    = svc.uptime_percent !== null ? svc.uptime_percent.toFixed(1) : '—';
            var upColor  = svc.uptime_percent !== null ? uptimeColor(svc.uptime_percent) : '#484f58';
            var upWidth  = svc.uptime_percent !== null ? svc.uptime_percent : 0;
            var nameHtml = svc.frontend_url
                ? '<a href="' + escapeHtml(svc.frontend_url) + '" target="_blank" rel="noopener noreferrer">'
                  + escapeHtml(svc.name) + ' <span class="link-arrow">↗</span></a>'
                : escapeHtml(svc.name);
            var disabledBadge = isEnabled ? '' : ' <span class="disabled-badge">disabled</span>';
            var backendHtml = '<span class="backend-label">Backend:</span> '
                + '<a href="' + escapeHtml(svc.url) + '" target="_blank" rel="noopener noreferrer" class="backend-link">'
                + escapeHtml(svc.url) + '</a>';
            var toggleBtn = isSelf
                ? ''
                : '<button id="toggle-btn-' + svc.id + '" class="service-toggle' + (isEnabled ? ' on' : ' off') + '" '
                  + 'onclick="toggleServiceEnabled(\'' + svc.id + '\')" '
                  + 'title="' + (isEnabled ? 'Active — click to disable' : 'Disabled — click to enable') + '">'
                  + '<span class="toggle-knob"></span></button>';
            var checkBtn = isEnabled
                ? '<button id="check-btn-' + svc.id + '" class="btn-icon" onclick="checkService(\'' + svc.id + '\')" title="Check now">⟳</button>'
                : '<button class="btn-icon" disabled title="Enable service before checking">⟳</button>';
            var cardCls = 'service-card' + (isEnabled ? '' : ' disabled');
            return '<div class="' + cardCls + '">'
                + '<div class="status-icon">' + cfg.icon + '</div>'
                + '<div class="service-info">'
                +   '<div class="service-name">' + nameHtml + disabledBadge + '</div>'
                +   '<div class="service-backend">' + backendHtml + '</div>'
                + '</div>'
                + '<div class="service-meta">'
                +   '<div class="response-time ' + rtClass(svc.response_time_ms) + '">' + rtText(svc.response_time_ms) + '</div>'
                +   '<div class="uptime-bar"><div class="uptime-fill" style="width:' + upWidth + '%;background:' + upColor + '"></div></div>'
                +   '<div class="uptime-text">Uptime: ' + upPct + '%</div>'
                + '</div>'
                + '<div class="service-actions">'
                +   toggleBtn
                +   checkBtn
                +   '<button class="btn-icon delete" onclick="deleteService(\'' + svc.id + '\')" title="Delete">✕</button>'
                + '</div>'
                + '</div>';
        }).join('');
    }

    if (!_bhUserEditing) {
        document.getElementById('bh-start').textContent = meta.business_hours_start;
        document.getElementById('bh-end').textContent   = meta.business_hours_end;
    }

    var bhEnabled = meta.business_hours_enabled;
    var bhBadge   = document.getElementById('bh-badge');
    var bhToggle  = document.getElementById('bh-toggle-btn');

    var bhStartVal = meta.business_hours_start;
    var bhEndVal   = meta.business_hours_end;
    var bhLabel    = bhStartVal < bhEndVal
        ? bhStartVal + ':00 – ' + bhEndVal + ':00 CET'
        : bhStartVal + ':00 – ' + bhEndVal + ':00 CET (+1d)';

    if (bhEnabled) {
        bhBadge.className    = 'bh-badge on';
        bhBadge.textContent  = 'ON · ' + bhLabel;
        bhToggle.className   = 'btn-bh-toggle disable';
        bhToggle.textContent = 'Disable';
    } else {
        bhBadge.className    = 'bh-badge off';
        bhBadge.textContent  = 'OFF';
        bhToggle.className   = 'btn-bh-toggle enable';
        bhToggle.textContent = 'Enable';
    }
}

fetchServices();
_setPolling(POLL_IDLE);
</script>
