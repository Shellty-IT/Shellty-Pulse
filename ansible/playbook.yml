---
# ===========================================
# Shellty Pulse — Ansible Deployment Playbook
# ===========================================
# Deploys Service Health Monitor as a Docker Compose stack.
#
# Usage:
#   ansible-playbook ansible/playbook.yml -i "HOST," -u ubuntu --private-key ~/.ssh/id_rsa
#   ansible-playbook ansible/playbook.yml -i inventory.ini
#
# Requirements:
#   - Target host: Ubuntu 22.04 / 24.04 (Oracle Cloud)
#   - User with sudo privileges
#   - Internet access
# ===========================================

- name: Deploy Shellty Pulse — Service Health Monitor
  hosts: all
  become: true

  vars:
    app_name: "shellty-pulse"
    app_port: 5000
    app_version: "1.0.0"
    app_repo: "https://github.com/Shellty-IT/Shellty-Pulse.git"
    app_dir: "/home/{{ ansible_user }}/Shellty-Pulse"
    docker_user: "{{ ansible_user }}"

  pre_tasks:
    - name: Verify target is Debian/Ubuntu
      ansible.builtin.assert:
        that:
          - ansible_os_family == "Debian"
        fail_msg: "This playbook supports Debian/Ubuntu only."
      tags: [always]

    - name: Get system architecture
      ansible.builtin.command: dpkg --print-architecture
      register: dpkg_arch
      changed_when: false
      tags: [docker, setup]

  handlers:
    - name: Restart Docker
      ansible.builtin.service:
        name: docker
        state: restarted

  tasks:

    # === Docker Installation ===

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: [docker, setup]

    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
        state: present
      tags: [docker, setup]

    - name: Create Docker keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: [docker, setup]

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags: [docker, setup]

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
      tags: [docker, setup]

    - name: Install Docker CE
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: true
      notify: Restart Docker
      tags: [docker, setup]

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      tags: [docker, setup]

    - name: Add deploy user to docker group
      ansible.builtin.user:
        name: "{{ docker_user }}"
        groups: docker
        append: true
      tags: [docker, setup]

    # === Application Deployment ===

    - name: Clone or update repository
      ansible.builtin.git:
        repo: "{{ app_repo }}"
        dest: "{{ app_dir }}"
        version: main
        force: true
      become: false
      tags: [deploy]

    - name: Build and start with Docker Compose
      ansible.builtin.command:
        cmd: docker compose up --build -d
        chdir: "{{ app_dir }}"
      changed_when: true
      tags: [deploy]

    # === Verification ===

    - name: Wait for application to become healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        return_content: true
        status_code: 200
      register: health_result
      retries: 10
      delay: 3
      until: health_result.status == 200
      tags: [verify]

    - name: Display health check result
      ansible.builtin.debug:
        msg: >
          Shellty Pulse is running!
          Status: {{ health_result.json.status }}
          Version: {{ health_result.json.version }}
          Uptime: {{ health_result.json.uptime_seconds }}s
          Scheduler: {{ health_result.json.scheduler_running }}
          Services: {{ health_result.json.monitored_services }}
          Dashboard: http://{{ ansible_default_ipv4.address | default('localhost') }}:{{ app_port }}
      tags: [verify]

    - name: Verify application version matches expected
      ansible.builtin.assert:
        that:
          - health_result.json.version == app_version
        fail_msg: >
          Version mismatch! Expected {{ app_version }},
          got {{ health_result.json.version }}
      tags: [verify]

    # === Firewall ===

    - name: Open port {{ app_port }} in iptables
      ansible.builtin.iptables:
        chain: INPUT
        protocol: tcp
        destination_port: "{{ app_port }}"
        jump: ACCEPT
        state: present
      tags: [firewall]

    - name: Persist iptables rules
      ansible.builtin.command: netfilter-persistent save
      changed_when: true
      failed_when: false
      tags: [firewall]
