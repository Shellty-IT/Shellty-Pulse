# ============================================
# Shellty Pulse — Ansible Deployment Playbook
# ============================================
# Deploys Service Health Monitor as a Docker container.
#
# Usage:
#   ansible-playbook ansible/playbook.yml -i "localhost," -c local
#   ansible-playbook ansible/playbook.yml -i inventory.ini
#
# Requirements:
#   - Target host has Python 3 installed
#   - User has sudo privileges
#   - Internet access (for apt packages and pip)
# ============================================

---
- name: Deploy Shellty Pulse — Service Health Monitor
  hosts: all
  become: true

  # ----------------------------------------
  # Variables
  # ----------------------------------------
  vars:
    app_name: "shellty-pulse"
    app_port: 5000
    app_image: "shellty-pulse"
    ping_interval: "600"
    request_timeout: "10"
    preloaded_services: >-
      [
        {"name":"KSeF Master","url":"https://ksef-master-backend.onrender.com/health","frontend_url":"https://ksef-master.netlify.app/"},
        {"name":"Postlio","url":"https://postlio-backend.onrender.com/health","frontend_url":"https://postlio.netlify.app/"},
        {"name":"Shellty Blog","url":"https://shellty-blog.onrender.com/health","frontend_url":"https://shellty-blog.onrender.com/"},
        {"name":"SmartQuote AI","url":"https://smartquote-backend-fzh5.onrender.com/api/health","frontend_url":"https://smartquote-ai.netlify.app/"}
      ]

  # ----------------------------------------
  # Tasks
  # ----------------------------------------
  tasks:

    # === Docker Installation ===

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      tags: [docker, setup]

    - name: Install Docker prerequisites
      ansible.builtin.apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - python3-pip
        state: present
      tags: [docker, setup]

    - name: Create Docker keyrings directory
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"
      tags: [docker, setup]

    - name: Download Docker GPG key
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"
      tags: [docker, setup]

    - name: Add Docker APT repository
      ansible.builtin.apt_repository:
        repo: >-
          deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        state: present
      tags: [docker, setup]

    - name: Install Docker CE
      ansible.builtin.apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: true
      tags: [docker, setup]

    - name: Ensure Docker service is running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true
      tags: [docker, setup]

    - name: Install Python Docker SDK (for Ansible docker modules)
      ansible.builtin.pip:
        name: docker
        state: present
        executable: pip3
      tags: [docker, setup]

    # === Application Deployment ===

    - name: Create application directory
      ansible.builtin.file:
        path: "/opt/{{ app_name }}"
        state: directory
        mode: "0755"
      tags: [deploy]

    - name: Copy application file
      ansible.builtin.copy:
        src: "../app.py"
        dest: "/opt/{{ app_name }}/app.py"
        mode: "0644"
      tags: [deploy]

    - name: Copy Dockerfile
      ansible.builtin.copy:
        src: "../Dockerfile"
        dest: "/opt/{{ app_name }}/Dockerfile"
        mode: "0644"
      tags: [deploy]

    - name: Build Docker image
      community.docker.docker_image:
        name: "{{ app_image }}"
        tag: latest
        source: build
        build:
          path: "/opt/{{ app_name }}"
        force_source: true
      tags: [deploy]

    - name: Stop and remove existing container (if any)
      community.docker.docker_container:
        name: "{{ app_name }}"
        state: absent
      tags: [deploy]

    - name: Run Shellty Pulse container
      community.docker.docker_container:
        name: "{{ app_name }}"
        image: "{{ app_image }}:latest"
        state: started
        restart_policy: unless-stopped
        ports:
          - "{{ app_port }}:5000"
        env:
          PING_INTERVAL: "{{ ping_interval }}"
          REQUEST_TIMEOUT: "{{ request_timeout }}"
          PYTHONUNBUFFERED: "1"
          SERVICES: "{{ preloaded_services }}"
        healthcheck:
          test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
          interval: 30s
          timeout: 10s
          retries: 3
          start_period: 15s
      tags: [deploy]

    # === Verification ===

    - name: Wait for application to become healthy
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/health"
        method: GET
        return_content: true
        status_code: 200
      register: health_result
      retries: 10
      delay: 3
      until: health_result.status == 200
      tags: [verify]

    - name: Display health check result
      ansible.builtin.debug:
        msg: >
          ✅ Shellty Pulse is running!
          Status: {{ health_result.json.status }}
          Timestamp: {{ health_result.json.timestamp }}
          Dashboard: http://{{ ansible_default_ipv4.address | default('localhost') }}:{{ app_port }}
      tags: [verify]

    - name: Verify services are loaded
      ansible.builtin.uri:
        url: "http://localhost:{{ app_port }}/api/services"
        method: GET
        return_content: true
        status_code: 200
      register: services_result
      tags: [verify]

    - name: Display loaded services
      ansible.builtin.debug:
        msg: >
          📋 Loaded {{ services_result.json.meta.total_services }} services.
          Overall status: {{ services_result.json.meta.overall_status }}
          Auto-ping: {{ services_result.json.meta.auto_ping_enabled }}
      tags: [verify]