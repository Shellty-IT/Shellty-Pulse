# ===========================================
# Shellty Pulse — CI Pipeline
# ===========================================
# Runs on push to main and pull requests to main.
# Jobs: lint → build + integration tests, compose test.
# ===========================================

name: CI — Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ----------------------------------------
  # Job 1: Code Quality Check
  # ----------------------------------------
  lint:
    name: "\U0001F50D Code Quality"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install flask==3.1.1 apscheduler==3.10.4 requests==2.32.3 flake8

      - name: Check Python syntax
        run: python -m py_compile app.py

      - name: Lint with flake8 (E501 excluded — inline HTML/SVG template)
        run: flake8 app.py --max-line-length=120 --extend-ignore=E501 --statistics

      - name: Unit tests (application factory)
        env:
          TESTING: "1"
        run: |
          python3 -c "
          import os
          os.environ['TESTING'] = '1'
          from app import create_app

          app = create_app(testing=True)
          client = app.test_client()

          # Test /health
          r = client.get('/health')
          assert r.status_code == 200
          data = r.get_json()
          assert data['status'] == 'ok'
          assert data['service'] == 'shellty-pulse'
          assert 'version' in data
          assert 'uptime_seconds' in data
          print('✅ Unit: GET /health — PASSED')

          # Test GET /api/services (empty in test mode)
          r = client.get('/api/services')
          assert r.status_code == 200
          data = r.get_json()
          assert 'services' in data
          assert 'meta' in data
          print('✅ Unit: GET /api/services — PASSED')

          # Test POST /api/services — valid
          r = client.post('/api/services', json={
              'name': 'Test',
              'url': 'https://example.com/health'
          })
          assert r.status_code == 201
          svc_id = r.get_json()['id']
          print(f'✅ Unit: POST /api/services — PASSED (id: {svc_id})')

          # Test POST /api/services — reject empty name
          r = client.post('/api/services', json={'name': '', 'url': 'https://x.com'})
          assert r.status_code == 400
          print('✅ Unit: Validation (empty name) — PASSED')

          # Test POST /api/services — reject invalid URL
          r = client.post('/api/services', json={'name': 'X', 'url': 'not-a-url'})
          assert r.status_code == 400
          print('✅ Unit: Validation (bad URL) — PASSED')

          # Test POST /api/services — SSRF protection
          r = client.post('/api/services', json={
              'name': 'SSRF', 'url': 'http://169.254.169.254/latest/meta-data/'
          })
          assert r.status_code == 400
          print('✅ Unit: SSRF protection (metadata) — PASSED')

          r = client.post('/api/services', json={
              'name': 'SSRF2', 'url': 'http://127.0.0.1:6379/'
          })
          assert r.status_code == 400
          print('✅ Unit: SSRF protection (localhost) — PASSED')

          # Test DELETE
          r = client.delete(f'/api/services/{svc_id}')
          assert r.status_code == 204
          print(f'✅ Unit: DELETE /api/services/{svc_id} — PASSED')

          # Test DELETE — not found
          r = client.delete('/api/services/nonexistent')
          assert r.status_code == 404
          print('✅ Unit: DELETE (not found) — PASSED')

          # Test toggle auto-ping
          r = client.post('/api/toggle-auto-ping')
          assert r.status_code == 200
          assert 'auto_ping_enabled' in r.get_json()
          print('✅ Unit: POST /api/toggle-auto-ping — PASSED')

          # Test set ping interval — valid
          r = client.post('/api/ping-interval', json={'interval': 900})
          assert r.status_code == 200
          assert r.get_json()['interval'] == 900
          print('✅ Unit: POST /api/ping-interval (900) — PASSED')

          # Test set ping interval — invalid
          r = client.post('/api/ping-interval', json={'interval': 999})
          assert r.status_code == 400
          print('✅ Unit: POST /api/ping-interval (invalid) — PASSED')

          # Test dashboard
          r = client.get('/')
          assert r.status_code == 200
          assert b'Shellty Pulse' in r.data
          print('✅ Unit: GET / (Dashboard) — PASSED')

          print()
          print('=' * 50)
          print('All unit tests passed!')
          print('=' * 50)
          "

  # ----------------------------------------
  # Job 2: Docker Build & API Integration Tests
  # ----------------------------------------
  build-and-test:
    name: "\U0001F433 Build & Integration Tests"
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (with cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: shellty-pulse:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          docker run -d \
            --name shellty-pulse-test \
            -p 5000:5000 \
            -e SERVICES='[{"name":"Test Service","url":"https://httpbin.org/get","frontend_url":"https://example.com"}]' \
            shellty-pulse:test

      - name: Wait for container to be healthy
        run: |
          echo "Waiting for container to start..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              echo "✅ Container is healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Container failed to become healthy"
          docker logs shellty-pulse-test
          exit 1

      - name: Verify Docker HEALTHCHECK status
        run: |
          echo "Waiting for Docker HEALTHCHECK..."
          for i in $(seq 1 20); do
            status=$(docker inspect --format='{{.State.Health.Status}}' shellty-pulse-test 2>/dev/null || echo "none")
            if [ "$status" = "healthy" ]; then
              echo "✅ Docker HEALTHCHECK — PASSED (healthy after ~${i}×3s)"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Docker HEALTHCHECK — FAILED (status: $status)"
          docker inspect --format='{{json .State.Health}}' shellty-pulse-test
          exit 1

      # --- Test all API endpoints ---

      - name: "Test GET /health (enriched response)"
        run: |
          response=$(curl -sf http://localhost:5000/health)
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'ok', f'Expected ok, got {data[\"status\"]}'
          assert 'timestamp' in data, 'Missing timestamp'
          assert data['service'] == 'shellty-pulse', 'Wrong service name'
          assert 'version' in data, 'Missing version'
          assert 'uptime_seconds' in data, 'Missing uptime_seconds'
          assert 'monitored_services' in data, 'Missing monitored_services'
          assert 'scheduler_running' in data, 'Missing scheduler_running'
          print(f'✅ GET /health — PASSED (v{data[\"version\"]}, uptime {data[\"uptime_seconds\"]}s, {data[\"monitored_services\"]} services)')
          "

      - name: "Test GET / (Dashboard)"
        run: |
          status_code=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:5000/)
          if [ "$status_code" = "200" ]; then
            echo "✅ GET / (Dashboard) — PASSED (HTTP $status_code)"
          else
            echo "❌ GET / (Dashboard) — FAILED (HTTP $status_code)"
            exit 1
          fi

      - name: "Test GET /api/services"
        run: |
          response=$(curl -sf http://localhost:5000/api/services)
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'services' in data, 'Missing services key'
          assert 'meta' in data, 'Missing meta key'
          assert data['meta']['total_services'] >= 1, 'No services loaded'
          assert 'auto_ping_enabled' in data['meta'], 'Missing auto_ping_enabled'
          assert 'ping_interval' in data['meta'], 'Missing ping_interval'
          print(f'✅ GET /api/services — PASSED ({data[\"meta\"][\"total_services\"]} services)')
          "

      - name: "Test POST /api/services (Add service)"
        run: |
          response=$(curl -sf -X POST http://localhost:5000/api/services \
            -H "Content-Type: application/json" \
            -d '{"name":"CI Test Service","url":"https://httpbin.org/status/200"}')
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['name'] == 'CI Test Service', 'Wrong name'
          assert data['status'] == 'unknown', 'Should be unknown initially'
          assert 'id' in data, 'Missing id'
          print(f'✅ POST /api/services — PASSED (id: {data[\"id\"]})')
          "

      - name: "Test POST /api/check-all"
        run: |
          response=$(curl -sf -X POST http://localhost:5000/api/check-all)
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'services' in data, 'Missing services'
          assert 'overall_status' in data, 'Missing overall_status'
          checked = [s for s in data['services'] if s['status'] != 'unknown']
          print(f'✅ POST /api/check-all — PASSED ({len(data[\"services\"])} services, {len(checked)} checked)')
          "

      - name: "Test POST /api/toggle-auto-ping"
        run: |
          response=$(curl -sf -X POST http://localhost:5000/api/toggle-auto-ping)
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert 'auto_ping_enabled' in data, 'Missing auto_ping_enabled'
          print(f'✅ POST /api/toggle-auto-ping — PASSED (enabled: {data[\"auto_ping_enabled\"]})')
          "

      - name: "Test POST /api/ping-interval"
        run: |
          response=$(curl -sf -X POST http://localhost:5000/api/ping-interval \
            -H "Content-Type: application/json" \
            -d '{"interval": 900}')
          echo "$response" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['interval'] == 900, f'Expected 900, got {data[\"interval\"]}'
          assert data['label'] == '15 min', f'Wrong label: {data[\"label\"]}'
          print(f'✅ POST /api/ping-interval — PASSED (set to {data[\"label\"]})')
          "

      - name: "Test DELETE /api/services/<id>"
        run: |
          # Find the CI Test Service ID
          services=$(curl -sf http://localhost:5000/api/services)
          service_id=$(echo "$services" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          matches = [s['id'] for s in data['services'] if s['name'] == 'CI Test Service']
          print(matches[0] if matches else '')
          ")

          if [ -z "$service_id" ]; then
            echo "❌ Could not find CI Test Service to delete"
            exit 1
          fi

          status_code=$(curl -o /dev/null -s -w "%{http_code}" -X DELETE "http://localhost:5000/api/services/$service_id")
          if [ "$status_code" = "204" ]; then
            echo "✅ DELETE /api/services/$service_id — PASSED (HTTP $status_code)"
          else
            echo "❌ DELETE — FAILED (HTTP $status_code)"
            exit 1
          fi

      - name: "Test input validation (reject empty fields)"
        run: |
          status_code=$(curl -o /dev/null -s -w "%{http_code}" -X POST http://localhost:5000/api/services \
            -H "Content-Type: application/json" \
            -d '{"name":""}')
          if [ "$status_code" = "400" ]; then
            echo "✅ Validation test — PASSED (rejected invalid input with HTTP 400)"
          else
            echo "❌ Validation test — FAILED (expected 400, got $status_code)"
            exit 1
          fi

      - name: "Test input validation (reject invalid URL)"
        run: |
          status_code=$(curl -o /dev/null -s -w "%{http_code}" -X POST http://localhost:5000/api/services \
            -H "Content-Type: application/json" \
            -d '{"name":"Bad","url":"not-a-url"}')
          if [ "$status_code" = "400" ]; then
            echo "✅ URL validation — PASSED (rejected invalid URL with HTTP 400)"
          else
            echo "❌ URL validation — FAILED (expected 400, got $status_code)"
            exit 1
          fi

      - name: "Test SSRF protection (block metadata endpoint)"
        run: |
          status_code=$(curl -o /dev/null -s -w "%{http_code}" -X POST http://localhost:5000/api/services \
            -H "Content-Type: application/json" \
            -d '{"name":"SSRF","url":"http://169.254.169.254/latest/meta-data/"}')
          if [ "$status_code" = "400" ]; then
            echo "✅ SSRF protection — PASSED (blocked metadata URL)"
          else
            echo "❌ SSRF protection — FAILED (expected 400, got $status_code)"
            exit 1
          fi

      - name: "Test SSRF protection (block localhost)"
        run: |
          status_code=$(curl -o /dev/null -s -w "%{http_code}" -X POST http://localhost:5000/api/services \
            -H "Content-Type: application/json" \
            -d '{"name":"SSRF2","url":"http://127.0.0.1:6379/"}')
          if [ "$status_code" = "400" ]; then
            echo "✅ SSRF protection — PASSED (blocked localhost)"
          else
            echo "❌ SSRF protection — FAILED (expected 400, got $status_code)"
            exit 1
          fi

      - name: "Test invalid ping interval"
        run: |
          status_code=$(curl -o /dev/null -s -w "%{http_code}" -X POST http://localhost:5000/api/ping-interval \
            -H "Content-Type: application/json" \
            -d '{"interval": 999}')
          if [ "$status_code" = "400" ]; then
            echo "✅ Invalid interval — PASSED (rejected 999 with HTTP 400)"
          else
            echo "❌ Invalid interval — FAILED (expected 400, got $status_code)"
            exit 1
          fi

      - name: Container logs (debug)
        if: always()
        run: docker logs shellty-pulse-test

      - name: Cleanup
        if: always()
        run: docker rm -f shellty-pulse-test || true

  # ----------------------------------------
  # Job 3: Docker Compose Integration Test
  # ----------------------------------------
  compose-test:
    name: "\U0001F419 Docker Compose Test"
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build and start with Docker Compose
        run: docker compose up --build -d

      - name: Wait for service to be healthy
        run: |
          echo "Waiting for service..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              echo "✅ Service healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Service failed to start"
          docker compose logs
          exit 1

      - name: Verify Docker Compose HEALTHCHECK status
        run: |
          echo "Waiting for Docker Compose HEALTHCHECK..."
          for i in $(seq 1 20); do
            status=$(docker inspect --format='{{.State.Health.Status}}' shellty-pulse 2>/dev/null || echo "none")
            if [ "$status" = "healthy" ]; then
              echo "✅ Compose HEALTHCHECK — PASSED (healthy after ~${i}×3s)"
              exit 0
            fi
            sleep 3
          done
          echo "❌ Compose HEALTHCHECK — FAILED (status: $status)"
          docker inspect --format='{{json .State.Health}}' shellty-pulse
          exit 1

      - name: Verify health endpoint (enriched)
        run: |
          curl -sf http://localhost:5000/health | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'ok'
          assert 'version' in data
          assert 'scheduler_running' in data
          print(f'✅ Health endpoint OK (v{data[\"version\"]})')
          "

      - name: Verify preloaded services (4 services from compose)
        run: |
          curl -sf http://localhost:5000/api/services | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          count = data['meta']['total_services']
          assert count == 4, f'Expected 4 preloaded services, got {count}'
          print(f'✅ Preloaded services: {count}')
          for svc in data['services']:
              print(f'   - {svc[\"name\"]}: {svc[\"url\"]}')
          "

      - name: Verify dashboard loads
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:5000/)
          [ "$status" = "200" ] && echo "✅ Dashboard OK" || (echo "❌ Dashboard failed" && exit 1)

      - name: Docker Compose logs
        if: always()
        run: docker compose logs

      - name: Cleanup
        if: always()
        run: docker compose down