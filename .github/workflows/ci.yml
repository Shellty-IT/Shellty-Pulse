# ===========================================
# Shellty Pulse — CI/CD Pipeline
# ===========================================
# Quality gate + auto deploy to Oracle Cloud.
# No external service pinging — all checks are mocked or local.
# ===========================================

name: "Shellty Pulse CI/CD"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ────────────────────────────────────────────
  # Job 1: Lint & Format
  # ────────────────────────────────────────────
  lint-and-format:
    name: "Lint & Format"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-lint-

      - name: Install linting tools
        run: pip install flake8 black isort

      - name: Check formatting with black
        run: black --check app.py pulse/

      - name: Check import order with isort
        run: isort --check-only --profile black app.py pulse/

      - name: Lint with flake8
        run: flake8 app.py pulse/ --max-line-length=120 --extend-ignore=E501,W503 --statistics

  # ────────────────────────────────────────────
  # Job 2: Unit Tests
  # ────────────────────────────────────────────
  test:
    name: "Unit Tests"
    runs-on: ubuntu-latest
    needs: lint-and-format
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-test-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run unit tests
        env:
          TESTING: "1"
          DISABLE_SCHEDULER: "true"
        run: pytest tests/ --tb=short -v

  # ────────────────────────────────────────────
  # Job 3: Docker Build & Smoke Test
  # ────────────────────────────────────────────
  build-docker:
    name: "Docker Build"
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shellty-pulse:test .

      - name: Run container
        run: |
          docker run -d \
            --name test-container \
            -p 5000:5000 \
            -e SERVICES='[{"name":"Test","url":"https://httpbin.org/get"}]' \
            shellty-pulse:test

      - name: Wait for container to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              echo "Container healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "Container failed to start"
          docker logs test-container
          exit 1

      - name: Verify health endpoint
        run: |
          curl -sf http://localhost:5000/health | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['status'] == 'ok'
          assert data['service'] == 'shellty-pulse'
          print(f'Health OK — v{data[\"version\"]}, uptime {data[\"uptime_seconds\"]}s')
          "

      - name: Verify dashboard loads
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:5000/)
          [ "$status" = "200" ] && echo "Dashboard OK" || (echo "Dashboard failed (HTTP $status)" && exit 1)

      - name: Container logs
        if: always()
        run: docker logs test-container

      - name: Cleanup
        if: always()
        run: docker rm -f test-container || true

  # ────────────────────────────────────────────
  # Job 4: Deploy to Oracle Cloud
  # ────────────────────────────────────────────
  deploy:
    name: "Deploy to Oracle"
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          port: ${{ secrets.ORACLE_PORT }}
          script: |
            set -e
            cd ~/Shellty-Pulse

            echo "=== Pulling latest code ==="
            git pull origin main

            echo "=== Stopping current container ==="
            docker compose down

            echo "=== Building fresh image ==="
            docker compose build --no-cache

            echo "=== Starting container ==="
            docker compose up -d

            echo "=== Waiting for health check ==="
            sleep 10
            curl -sf http://localhost:5000/health | python3 -c "
            import sys, json
            data = json.load(sys.stdin)
            print(f'Deploy OK — v{data[\"version\"]}, {data[\"monitored_services\"]} services')
            "

            echo "=== Container status ==="
            docker ps --filter name=shellty-pulse
