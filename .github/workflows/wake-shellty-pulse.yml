name: Wake Shellty Pulse (Business Hours)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
    inputs:
      manual_trigger:
        description: 'Manual trigger from dashboard'
        required: false
        default: 'false'

permissions:
  contents: read
  actions: read

jobs:
  wake:
    name: "🔔 Wake Shellty Pulse"
    runs-on: ubuntu-latest
    timeout-minutes: 8

    env:
      APP_URL: https://shellty-pulse.onrender.com

    steps:
      - name: Check business hours
        id: check-time
        run: |
          MANUAL="${{ github.event.inputs.manual_trigger }}"

          if [ "$MANUAL" = "true" ]; then
            echo "🔵 Manual trigger — bypassing business hours"
            echo "should_wake=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          BH_ENABLED="${{ vars.BH_ENABLED }}"
          BH_START="${{ vars.BH_START }}"
          BH_END="${{ vars.BH_END }}"

          echo "BH_ENABLED : $BH_ENABLED"
          echo "BH_START   : $BH_START"
          echo "BH_END     : $BH_END"

          if [ -z "$BH_ENABLED" ] || [ "$BH_ENABLED" != "true" ]; then
            echo "⏭️ Business hours disabled — skip"
            echo "should_wake=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ -z "$BH_START" ] || [ -z "$BH_END" ]; then
            echo "⚠️ BH_START/BH_END not set — skip"
            echo "should_wake=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          current_hour=$(TZ='Europe/Warsaw' date +%-H)
          current_min=$(TZ='Europe/Warsaw' date +%-M)
          current_total=$((current_hour * 60 + current_min))

          window_start=$((BH_START * 60))
          window_end=$((BH_END * 60 + 15))

          echo "Current time (CET/CEST): ${current_hour}:$(printf '%02d' $current_min) (${current_total} min)"
          echo "Business hours         : ${BH_START}:00 – ${BH_END}:00 (+ 15 min buffer)"
          echo "Window                 : ${window_start} – ${window_end} min"

          if [ "$BH_START" -lt "$BH_END" ]; then
            if [ "$current_total" -ge "$window_start" ] && [ "$current_total" -lt "$window_end" ]; then
              IN_WINDOW=true
            else
              IN_WINDOW=false
            fi
          else
            if [ "$current_total" -ge "$window_start" ] || [ "$current_total" -lt "$window_end" ]; then
              IN_WINDOW=true
            else
              IN_WINDOW=false
            fi
          fi

          if [ "$IN_WINDOW" = "true" ]; then
            echo "✅ Within business hours — will wake"
            echo "should_wake=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ Outside business hours — skip"
            echo "should_wake=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔥 Phase 1 — Wake Pulse + Fire all services
        if: steps.check-time.outputs.should_wake == 'true'
        run: |
          echo "🔔 Waking Shellty Pulse..."
          curl -sf --max-time 30 "$APP_URL/health" > /dev/null 2>&1 \
            && echo "✅ Shellty Pulse is awake" \
            || echo "⚠️ Pulse was sleeping — waking up"

          echo ""
          echo "🔔 Calling /api/wake-and-check..."
          WAKE_RESP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -X POST "$APP_URL/api/wake-and-check" \
            -H "Content-Type: application/json" \
            -H "X-Wake-Secret: ${{ secrets.WAKE_SECRET }}")
          echo "   /api/wake-and-check → HTTP $WAKE_RESP"

          echo ""
          echo "🔥 Fetching service list..."
          SERVICES_JSON=$(curl -sf --max-time 30 "$APP_URL/api/services" || echo "")

          if [ -z "$SERVICES_JSON" ]; then
            echo "❌ Failed to fetch service list"
            exit 1
          fi

          echo "🔥 Firing all services (kick cold starts)..."
          echo "$SERVICES_JSON" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          services = data.get('services', [])
          print(f'  Found {len(services)} services')
          for svc in services:
              print(svc['url'])
          " | tail -n +2 | while read -r url; do
            echo "  🔥 Firing: $url"
            curl -sf --max-time 10 "$url" > /dev/null 2>&1 \
              || echo "     (no response yet — cold start kicked)"
          done

          echo "✅ Phase 1 complete"

      - name: ⏳ Phase 2 — Wait for cold starts
        if: steps.check-time.outputs.should_wake == 'true'
        run: |
          echo "⏳ Waiting 90 seconds for Render cold starts..."
          sleep 90
          echo "✅ Cold start window complete"

      - name: ✔️ Phase 3 — Verify all services + update Pulse
        if: steps.check-time.outputs.should_wake == 'true'
        run: |
          echo "✔️ Verifying all services..."

          SERVICES_JSON=$(curl -sf --max-time 30 "$APP_URL/api/services" || echo "")

          if [ -z "$SERVICES_JSON" ]; then
            echo "❌ Failed to fetch service list"
            exit 1
          fi

          echo "$SERVICES_JSON" | python3 -c "
          import sys, json, subprocess

          data = json.load(sys.stdin)
          services = data.get('services', [])
          print(f'Verifying {len(services)} services...')

          success = 0
          failed  = 0

          for svc in services:
              name = svc['name']
              url  = svc['url']
              print(f'  ✔️  Checking: {name}')
              try:
                  result = subprocess.run(
                      ['curl', '-sf', '--max-time', '60', '-o', '/dev/null',
                       '-w', '%{http_code}', url],
                      capture_output=True, text=True
                  )
                  code = result.stdout.strip()
                  if code == '200':
                      print(f'      ✅ OK (HTTP {code})')
                      success += 1
                  else:
                      print(f'      ❌ FAILED (HTTP {code})')
                      failed += 1
              except Exception as e:
                  print(f'      ❌ ERROR: {e}')
                  failed += 1

          print()
          print(f'Results: {success} OK, {failed} failed')
          "

          echo ""
          echo "🔔 Final wake-and-check to update statuses in Pulse..."
          WAKE_RESP=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -X POST "$APP_URL/api/wake-and-check" \
            -H "Content-Type: application/json" \
            -H "X-Wake-Secret: ${{ secrets.WAKE_SECRET }}")
          echo "   /api/wake-and-check → HTTP $WAKE_RESP"

          echo "✅ Phase 3 complete"

      - name: Summary
        if: always()
        run: |
          MANUAL="${{ github.event.inputs.manual_trigger }}"
          if [ "${{ steps.check-time.outputs.should_wake }}" = "true" ]; then
            if [ "$MANUAL" = "true" ]; then
              echo "✅ Manual check complete (business hours bypassed)"
            else
              echo "✅ Scheduled check complete"
            fi
          else
            echo "⏭️ Skipped — outside business hours or disabled"
          fi