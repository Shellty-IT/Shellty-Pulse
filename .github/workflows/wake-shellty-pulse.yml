name: Wake Shellty Pulse (Business Hours)

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  wake:
    name: "🔔 Wake Shellty Pulse"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    env:
      APP_URL: https://shellty-pulse.onrender.com

    steps:
      - name: Check business hours config
        id: check-time
        run: |
          BH_ENABLED="${{ vars.BH_ENABLED }}"
          BH_START="${{ vars.BH_START }}"
          BH_END="${{ vars.BH_END }}"

          echo "BH_ENABLED : $BH_ENABLED"
          echo "BH_START   : $BH_START"
          echo "BH_END     : $BH_END"

          if [ -z "$BH_ENABLED" ] || [ -z "$BH_START" ] || [ -z "$BH_END" ]; then
            echo "⚠️ Business hours not configured — skip"
            echo "should_wake=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if [ "$BH_ENABLED" != "true" ]; then
            echo "⏭️ Business hours disabled — skip"
            echo "should_wake=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          current_hour=$(TZ='Europe/Warsaw' date +%-H)
          echo "Current hour (CET): $current_hour"
          echo "Business hours    : ${BH_START}:00 – ${BH_END}:00 CET"

          if [ "$current_hour" -ge "$BH_START" ] && \
             [ "$current_hour" -lt "$BH_END" ]; then
            echo "✅ Within business hours — will wake"
            echo "should_wake=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️ Outside business hours — skip (saving Render hours)"
            echo "should_wake=false" >> $GITHUB_OUTPUT
          fi

      # ── Step 1: Wake the app (cold start) ──────────────────────────────────
      - name: Wait for Shellty Pulse to wake
        if: steps.check-time.outputs.should_wake == 'true'
        run: |
          echo "⏳ Waiting for Shellty Pulse to wake up..."

          MAX_ATTEMPTS=8
          ATTEMPT=0
          SUCCESS=false

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "  Attempt $ATTEMPT/$MAX_ATTEMPTS — GET /api/services"

            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 \
              "$APP_URL/api/services" || echo "000")

            echo "  HTTP status: $HTTP_STATUS"

            if [ "$HTTP_STATUS" = "200" ]; then
              SUCCESS=true
              echo "✅ App is awake after attempt $ATTEMPT"
              break
            fi

            if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
              echo "  Sleeping 15s before retry..."
              sleep 15
            fi
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "❌ App did not wake after $MAX_ATTEMPTS attempts"
            exit 1
          fi

      # ── Step 2: Fire all services (Phase 1) ─────────────────────────────────
      - name: 🔥 Fire all services (kick cold starts)
        if: steps.check-time.outputs.should_wake == 'true'
        run: |
          echo "🔥 Phase 1 — Firing all services..."

          response=$(curl -sf \
            --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            "$APP_URL/api/fire-all" || echo "CURL_FAILED")

          if [ "$response" = "CURL_FAILED" ]; then
            echo "❌ POST /api/fire-all failed"
            exit 1
          fi

          echo "✅ Fire response:"
          echo "$response" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(f'  status         : {data.get(\"status\")}')
              print(f'  services_count : {data.get(\"services_count\")}')
              print(f'  message        : {data.get(\"message\")}')
          except Exception as e:
              print(f'  (raw) {sys.stdin.read()}')
          " || echo "$response"

      # ── Step 3: Wait for cold starts (Phase 2) ──────────────────────────────
      - name: ⏳ Wait for Render cold starts
        if: steps.check-time.outputs.should_wake == 'true'
        run: |
          echo "⏳ Phase 2 — Waiting 120 seconds for cold starts..."
          sleep 120
          echo "✅ Cold start window complete"

      # ── Step 4: Verify all services (Phase 3) ───────────────────────────────
      - name: ✔️ Verify all services
        if: steps.check-time.outputs.should_wake == 'true'
        run: |
          echo "✔️ Phase 3 — Verifying all services..."

          response=$(curl -sf \
            --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            "$APP_URL/api/verify-all" || echo "CURL_FAILED")

          if [ "$response" = "CURL_FAILED" ]; then
            echo "❌ POST /api/verify-all failed"
            exit 1
          fi

          echo "✅ Verify response:"
          echo "$response" | python3 -c "
          import sys, json
          try:
              data = json.load(sys.stdin)
              print(f'  status         : {data.get(\"status\")}')
              print(f'  services_count : {data.get(\"services_count\")}')
              print(f'  message        : {data.get(\"message\")}')
          except Exception as e:
              print(f'  (raw) {sys.stdin.read()}')
          " || echo "$response"

      - name: Summary
        if: always()
        run: |
          should="${{ steps.check-time.outputs.should_wake }}"
          if [ "$should" = "true" ]; then
            echo "✅ Shellty Pulse: fire → 120s wait → verify complete"
          else
            echo "⏭️ Skipped — outside business hours (Render hours saved)"
          fi